<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ title }}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    color: #e6faff;
    font-family: 'Segoe UI', sans-serif;
}

/* Neon Glow */
.glow {
    color: #e6faff;
    text-shadow: 0 0 5px #00ffe0, 0 0 10px #00ffe0;
}

/* Card */
.card {
    background: rgba(0,0,0,0.7);
    border: 1px solid #00ffe0;
    box-shadow: 0 0 25px rgba(0,255,224,0.3);
    border-radius: 15px;
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-5px);
    transition: 0.3s;
    box-shadow: 0 0 40px #00ffe0;
}

/* Buttons */
.btn {
    background: linear-gradient(45deg, #00ffe0, #00bcd4);
    border: none;
    color: black;
    font-weight: bold;
}

.btn:hover {
    background: #00ffe0;
}

/* Fade animation */
.fade-in {
    animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.hero-img {
    max-width: 100%;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 15px rgba(0,255,224,0.3));
}

@keyframes float {
    0% {transform: translateY(0);}
    50% {transform: translateY(-15px);}
    100% {transform: translateY(0);}
}

.card-img-wrapper {
    width: 100%;
    height: 180px;           /* 🔥 fixed height */
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1px solid rgba(0,255,224,0.3);
    box-shadow: 0 0 15px rgba(0,255,224,0.2);
    border-radius: 10px;
}

.card-img-wrapper img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;     /* ✅ NO distortion */
}

.arch-img-container {
    width: 100%;
    max-height: 450px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    padding: 10px;
}

.arch-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;   /* 🔥 keeps clarity */
    border-radius: 12px;
    border: 1px solid rgba(0,255,224,0.4);
    box-shadow: 0 0 25px rgba(0,255,224,0.2);
}

.arch-img:hover {
    transform: scale(1.05);
    transition: 0.3s;
}
</style>
</head>

<body>

<div class="container mt-4 fade-in">

    <!-- NAVBAR -->
    <div class="d-flex justify-content-between mb-3">
        <h3 class="glow">⚡ Project Planner</h3>

        {% if session.user %}
        <a href="/logout" class="btn btn-sm">Logout</a>
        {% endif %}
    </div>

    {% block content %}{% endblock %}
</div>

</body>
</html>
