{% extends "base.html" %}
{% block content %}

<div class="row align-items-center mb-4">

    <div class="col-md-6">
        <h1 class="hero-title">Project Timeline</h1>
        <p class="hero-sub">Execution visualization</p>
    </div>

    <div class="col-md-6 text-center">
        <img src="{{ url_for('static', filename='images/timeline.png') }}" class="hero-img">
    </div>

</div>

<div class="card p-3 text-center" style="max-height:500px;">

    <img src="{{ chart }}"
     style="max-height:300px; width:auto;"
     class="img-fluid mb-3">

    <canvas id="chart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
        labels: {{ plan.keys()|list }},
        datasets: [{
            label: 'Weeks',
            data: {{ plan.values()|list }},
            backgroundColor: '#00ffe0'
        }]
    }
});
</script>

{% endblock %}
