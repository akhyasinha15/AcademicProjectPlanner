{% extends "base.html" %}
{% block content %}

<div class="row align-items-center mb-4">

    <div class="col-md-6">
        <h1 class="hero-title">Project Planning</h1>
        <p class="hero-sub">Structured phase-wise execution</p>
    </div>

    <div class="col-md-6 text-center">
        <img src="{{ url_for('static', filename='images/planning.png') }}" class="hero-img">
    </div>

</div>

<div class="card p-4">
<table class="table table-dark">
<tr><th>Phase</th><th>Weeks</th></tr>

{% for phase, val in plan.items() %}
<tr><td>{{phase}}</td><td>{{val}}</td></tr>
{% endfor %}

</table>
</div>

<a href="/architecture" class="btn mt-3">Next ➜</a>

{% endblock %}
